<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרכב סביר 🎸 רשימת שירים</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            direction: rtl;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            border-radius: 20px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .band-name {
            font-size: 3em;
            background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { color: #aaa; font-size: 1.2em; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 120px;
        }

        .stat-number { font-size: 2em; font-weight: bold; color: #f5576c; }
        .stat-label { color: #aaa; font-size: 0.9em; margin-top: 5px; }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-color: transparent;
        }

        .playlist-link {
            text-align: center;
            margin: 20px 0;
        }

        .playlist-link a {
            color: #f5576c;
            text-decoration: none;
            font-size: 1.2em;
            padding: 12px 30px;
            border: 2px solid #f5576c;
            border-radius: 30px;
            transition: all 0.3s;
            display: inline-block;
        }

        .playlist-link a:hover {
            background: #f5576c;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }

        th {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: #f093fb;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr { transition: background 0.3s; }
        tr:hover { background: rgba(255,255,255,0.08); }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            display: inline-block;
        }

        .status-ready { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
        .status-learning { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .status-new { background: rgba(116, 185, 255, 0.2); color: #74b9ff; }

        .yt-link {
            color: #ff4757;
            text-decoration: none;
            font-size: 1.3em;
            transition: transform 0.3s;
            display: inline-block;
        }

        .yt-link:hover { transform: scale(1.3); }

        .legend {
            text-align: center;
            margin: 30px 0;
            color: #aaa;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 1.1em;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            margin-top: 30px;
        }

        /* ===== NEW: Add Song Form ===== */
        .add-song-form {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .add-song-form h3 { color: #f093fb; margin-bottom: 15px; }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-input {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.95em;
            flex: 1;
            min-width: 140px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus { border-color: #f093fb; }
        .form-input::placeholder { color: #777; }

        .form-select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.95em;
            outline: none;
            cursor: pointer;
        }

        .form-select option { background: #302b63; color: #fff; }

        .btn-add {
            padding: 10px 25px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn-add:hover { opacity: 0.85; }

        /* ===== NEW: Action Buttons ===== */
        .btn-edit, .btn-delete {
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: opacity 0.3s;
        }

        .btn-edit {
            background: rgba(116, 185, 255, 0.2);
            color: #74b9ff;
            margin-left: 5px;
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .btn-edit:hover, .btn-delete:hover { opacity: 0.7; }

        .status-select {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.9em;
            cursor: pointer;
            outline: none;
        }

        .status-select option { background: #302b63; color: #fff; }

        /* ===== NEW: Toolbar ===== */
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .toolbar-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        /* ===== NEW: Edit Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: linear-gradient(135deg, #1a1a3e, #302b63);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            width: 90%;
            max-width: 450px;
        }

        .modal h3 { color: #f093fb; margin-bottom: 20px; text-align: center; }

        .modal-field {
            margin-bottom: 15px;
        }

        .modal-field label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .modal-field input, .modal-field select {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.95em;
            outline: none;
        }

        .modal-field select option { background: #302b63; color: #fff; }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
        }

        .modal-btn-save {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            color: #fff;
        }

        .modal-btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }

        /* ===== NEW: Toast Notification ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(90deg, #f093fb, #f5576c);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1em;
            z-index: 2000;
            transition: transform 0.4s ease;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .band-name { font-size: 2em; }
            table { font-size: 0.85em; }
            th, td { padding: 8px; }
            .stats { gap: 15px; }
            .form-row { flex-direction: column; }
            .form-input, .form-select, .btn-add { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="band-name">🎸 הרכב סביר 🎸</div>
            <div class="subtitle">רשימת השירים הרשמית של הלהקה</div>
        </header>

        <div class="playlist-link">
            <a href="https://www.youtube.com/watch?v=7lvMNLhJrb0&list=PLQtKYxTP_A-vJ-yD-k3F6_o1DJ0_oyN6t" target="_blank">🎵 הפלייליסט המלא</a>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">סה"כ שירים</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="ready-count">0</div>
                <div class="stat-label">🟢 מוכנים</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="learning-count">0</div>
                <div class="stat-label">📖 בלימוד</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="new-count">0</div>
                <div class="stat-label">🔵 חדשים</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterSongs('all')">הכל</button>
            <button class="filter-btn" onclick="filterSongs('ready')">🟢 מוכנים</button>
            <button class="filter-btn" onclick="filterSongs('learning')">📖 בלימוד</button>
            <button class="filter-btn" onclick="filterSongs('new')">🔵 חדשים</button>
        </div>

        <!-- NEW: Add Song Form -->
        <div class="add-song-form">
            <h3>➕ הוספת שיר חדש</h3>
            <div class="form-row">
                <input type="text" id="new-name" class="form-input" placeholder="שם השיר">
                <input type="text" id="new-artist" class="form-input" placeholder="אמן">
                <input type="text" id="new-videoId" class="form-input" placeholder="YouTube Video ID">
                <select id="new-status" class="form-select">
                    <option value="new">🔵 חדש</option>
                    <option value="learning">📖 בלימוד</option>
                    <option value="ready">🟢 מוכן</option>
                </select>
                <button onclick="addSong()" class="btn-add">הוסף ➕</button>
            </div>
        </div>

        <!-- NEW: Toolbar -->
        <div class="toolbar">
            <button class="toolbar-btn" onclick="resetToOriginal()">🔄 איפוס לרשימה המקורית</button>
            <button class="toolbar-btn" onclick="exportJSON()">📥 ייצוא JSON</button>
        </div>

        <div id="songs-container">
            <div class="empty-state">⏳ טוען את רשימת השירים...</div>
        </div>

        <div class="legend">
            <div><span class="status status-ready">🟢 מוכן</span> - שיר זה כבר מוכן להופעה</div>
            <div><span class="status status-learning">📖 בלימוד</span> - בעבודה עליו כרגע</div>
            <div><span class="status status-new">🔵 חדש</span> - חדש בקרטה</div>
        </div>

        <footer>
            <p>© 2026 הרכב סביר | רשימת שירים רשמית</p>
        </footer>
    </div>

    <!-- NEW: Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h3>✏️ עריכת שיר</h3>
            <input type="hidden" id="edit-index">
            <div class="modal-field">
                <label>שם השיר</label>
                <input type="text" id="edit-name">
            </div>
            <div class="modal-field">
                <label>אמן</label>
                <input type="text" id="edit-artist">
            </div>
            <div class="modal-field">
                <label>YouTube Video ID</label>
                <input type="text" id="edit-videoId">
            </div>
            <div class="modal-field">
                <label>סטטוס</label>
                <select id="edit-status">
                    <option value="new">🔵 חדש</option>
                    <option value="learning">📖 בלימוד</option>
                    <option value="ready">🟢 מוכן</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-save" onclick="saveEdit()">💾 שמור</button>
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">ביטול</button>
            </div>
        </div>
    </div>

    <!-- NEW: Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let allSongs = [];
        let currentFilter = 'all';

        // ===== Toast Notification =====
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== localStorage =====
        function saveSongs() {
            localStorage.setItem('bandSongs', JSON.stringify(allSongs));
        }

        // ===== Load Songs (localStorage first, then GitHub) =====
        async function loadSongs() {
            const saved = localStorage.getItem('bandSongs');
            if (saved) {
                allSongs = JSON.parse(saved);
                updateStats();
                renderSongs();
                return;
            }
            try {
                const response = await fetch('https://raw.githubusercontent.com/guysega-lang/herev-savir/main/songs.json');
                const data = await response.json();
                allSongs = data.songs || [];
                updateStats();
                renderSongs();
            } catch (error) {
                console.error('Error loading songs:', error);
                document.getElementById('songs-container').innerHTML = 
                    '<div class="empty-state">שגיאה בטעינת רשימת השירים. אנא נסה מחדש.</div>';
            }
        }

        // ===== Stats =====
        function updateStats() {
            document.getElementById('total-count').textContent = allSongs.length;
            document.getElementById('ready-count').textContent = allSongs.filter(s => s.status === 'ready').length;
            document.getElementById('learning-count').textContent = allSongs.filter(s => s.status === 'learning').length;
            document.getElementById('new-count').textContent = allSongs.filter(s => s.status === 'new').length;
        }

        // ===== Render Songs (with edit/delete buttons & status dropdown) =====
        function renderSongs() {
            const filtered = currentFilter === 'all' 
                ? allSongs 
                : allSongs.filter(s => s.status === currentFilter);

            if (filtered.length === 0) {
                document.getElementById('songs-container').innerHTML = 
                    '<div class="empty-state">אין שירים בקטגוריה זו</div>';
                return;
            }

            let html = '<table><thead><tr><th>שם השיר</th><th>אמן</th><th>סטטוס</th><th>קישור</th><th>פעולות</th></tr></thead><tbody>';
            
            filtered.forEach(song => {
                const youtubeUrl = `https://www.youtube.com/watch?v=${song.videoId}`;
                const realIndex = allSongs.indexOf(song);
                html += `
                    <tr>
                        <td>${song.name}</td>
                        <td>${song.artist}</td>
                        <td>
                            <select class="status-select" onchange="changeStatus(${realIndex}, this.value)">
                                <option value="new" ${song.status==='new'?'selected':''}>🔵 חדש</option>
                                <option value="learning" ${song.status==='learning'?'selected':''}>📖 בלימוד</option>
                                <option value="ready" ${song.status==='ready'?'selected':''}>🟢 מוכן</option>
                            </select>
                        </td>
                        <td><a href="${youtubeUrl}" target="_blank" class="yt-link">▶️</a></td>
                        <td>
                            <button class="btn-edit" onclick="openEdit(${realIndex})">✏️</button>
                            <button class="btn-delete" onclick="deleteSong(${realIndex})">🗑️</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('songs-container').innerHTML = html;
        }

        // ===== Filter =====
        function filterSongs(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderSongs();
        }

        // ===== Add Song =====
        function addSong() {
            const name = document.getElementById('new-name').value.trim();
            const artist = document.getElementById('new-artist').value.trim();
            const videoId = document.getElementById('new-videoId').value.trim();
            const status = document.getElementById('new-status').value;

            if (!name || !artist) {
                showToast('⚠️ נא למלא שם שיר ואמן');
                return;
            }

            allSongs.push({ name, artist, videoId, status });
            saveSongs();
            updateStats();
            renderSongs();

            // Clear inputs
            document.getElementById('new-name').value = '';
            document.getElementById('new-artist').value = '';
            document.getElementById('new-videoId').value = '';
            document.getElementById('new-status').value = 'new';

            showToast(`✅ "${name}" נוסף בהצלחה!`);
        }

        // ===== Delete Song =====
        function deleteSong(index) {
            const songName = allSongs[index].name;
            if (confirm(`למחוק את "${songName}"?`)) {
                allSongs.splice(index, 1);
                saveSongs();
                updateStats();
                renderSongs();
                showToast(`🗑️ "${songName}" נמחק`);
            }
        }

        // ===== Change Status (inline dropdown) =====
        function changeStatus(index, newStatus) {
            allSongs[index].status = newStatus;
            saveSongs();
            updateStats();
            renderSongs();
            showToast(`🔄 סטטוס עודכן ל-${newStatus === 'ready' ? '🟢 מוכן' : newStatus === 'learning' ? '📖 בלימוד' : '🔵 חדש'}`);
        }

        // ===== Edit Modal =====
        function openEdit(index) {
            const song = allSongs[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-name').value = song.name;
            document.getElementById('edit-artist').value = song.artist;
            document.getElementById('edit-videoId').value = song.videoId || '';
            document.getElementById('edit-status').value = song.status;
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function saveEdit() {
            const index = parseInt(document.getElementById('edit-index').value);
            allSongs[index].name = document.getElementById('edit-name').value.trim();
            allSongs[index].artist = document.getElementById('edit-artist').value.trim();
            allSongs[index].videoId = document.getElementById('edit-videoId').value.trim();
            allSongs[index].status = document.getElementById('edit-status').value;
            saveSongs();
            updateStats();
            renderSongs();
            closeModal();
            showToast(`✅ "${allSongs[index].name}" עודכן בהצלחה!`);
        }

        // Close modal on overlay click
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ===== Reset to Original =====
        async function resetToOriginal() {
            if (confirm('לאפס לרשימה המקורית מ-GitHub? כל השינויים המקומיים יימחקו.')) {
                localStorage.removeItem('bandSongs');
                try {
                    const response = await fetch('https://raw.githubusercontent.com/guysega-lang/herev-savir/main/songs.json');
                    const data = await response.json();
                    allSongs = data.songs || [];
                    updateStats();
                    renderSongs();
                    showToast('🔄 הרשימה אופסה לגרסה המקורית');
                } catch (error) {
                    showToast('⚠️ שגיאה באיפוס');
                }
            }
        }

        // ===== Export JSON =====
        function exportJSON() {
            const dataStr = JSON.stringify({ songs: allSongs }, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'songs.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 הקובץ songs.json הורד בהצלחה');
        }

        // ===== Init =====
        window.addEventListener('DOMContentLoaded', loadSongs);
    </script>
</body>
</html>
